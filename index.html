<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Guide Bordighera</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --sand:#f5efe6;--ocean:#2a6b8a;--sun:#e8a020;--ev:#2e9e5b;
  --resto:#c0392b;--shop:#8e44ad;--activity:#d35400;--delicat:#1a6b5a;
  --street:#b5451b;--fav:#e8a020;--garden:#27ae60;--ceramic:#8B4513;--text:#1a1a2e;--radius:13px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--sand);color:var(--text);overflow-x:hidden;}

/* ── HEADER ── */
.header{background:var(--ocean);color:white;padding:12px 14px 8px;display:flex;flex-direction:column;gap:7px;position:sticky;top:0;z-index:400;}
.header-top{display:flex;align-items:center;gap:10px;}
.header-top h1{font-family:'Playfair Display',serif;font-size:19px;flex:1;}
#fav-count{background:var(--fav);color:white;border-radius:12px;padding:2px 8px;font-size:11px;font-weight:600;display:none;}
.search-wrap{position:relative;}
#search-input{width:100%;padding:8px 34px 8px 34px;border:none;border-radius:9px;font-size:13px;font-family:'DM Sans',sans-serif;background:rgba(255,255,255,.18);color:white;outline:none;}
#search-input::placeholder{color:rgba(255,255,255,.6);}
#search-input:focus{background:rgba(255,255,255,.28);}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:15px;pointer-events:none;}
#search-clear{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:rgba(255,255,255,.7);font-size:16px;cursor:pointer;display:none;padding:2px 5px;}

/* ── FILTRES ── */
.controls{display:flex;flex-wrap:wrap;gap:5px;padding:8px 10px;background:white;border-bottom:1px solid #eee;position:sticky;top:90px;z-index:390;}
.filter-btn{padding:5px 11px;border:1.5px solid #ddd;border-radius:20px;cursor:pointer;background:white;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:#555;transition:all .2s;flex-shrink:0;}
.filter-btn.active{background:var(--ocean);border-color:var(--ocean);color:white;}
.filter-btn.ev-btn.active{background:var(--ev);border-color:var(--ev);}
.filter-btn.resto-btn.active{background:var(--resto);border-color:var(--resto);}
.filter-btn.shop-btn.active{background:var(--shop);border-color:var(--shop);}
.filter-btn.activity-btn.active{background:var(--activity);border-color:var(--activity);}
.filter-btn.delicat-btn.active{background:var(--delicat);border-color:var(--delicat);}
.filter-btn.street-btn.active{background:var(--street);border-color:var(--street);}
.filter-btn.garden-btn.active{background:var(--garden);border-color:var(--garden);}
.filter-btn.ceramic-btn.active{background:var(--ceramic);border-color:var(--ceramic);}
.card.garden-card{border-left:4px solid var(--garden);}
.card.ceramic-card{border-left:4px solid var(--ceramic);}background:#e8f7ef;border-left:4px solid var(--ev);padding:8px 12px;margin:6px 10px 0;border-radius:8px;font-size:12px;color:#1a5c3a;line-height:1.5;}

/* ── MAP ── */
#map-wrapper{position:relative;}
#map{height:52vh;width:100%;border-bottom:3px solid var(--ocean);}
#loc-btn{position:absolute;bottom:14px;right:14px;z-index:399;background:white;border:none;border-radius:50%;width:40px;height:40px;box-shadow:0 2px 8px rgba(0,0,0,.25);cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;}
#loc-btn.tracking{background:#e0f7ea;}
@keyframes pulse-ring{0%{transform:scale(1);opacity:.7}70%{transform:scale(2.4);opacity:0}100%{transform:scale(2.4);opacity:0}}

/* ── LISTE ── */
#list{padding:8px 10px 120px;}
.search-empty{text-align:center;color:#aaa;padding:40px 20px;font-size:13px;}
.group-header{display:flex;align-items:center;gap:8px;padding:10px 4px 6px;font-size:13px;font-weight:700;color:#555;border-bottom:1px solid #e0d8cc;margin-bottom:6px;margin-top:12px;}
.group-header:first-child{margin-top:4px;}
.group-count{margin-left:auto;font-size:11px;color:#aaa;font-weight:400;}

/* Card – clic simple = focus map ; bouton ℹ️ = fiche */
.card{background:white;border-radius:var(--radius);padding:11px 13px;box-shadow:0 2px 7px rgba(0,0,0,.07);display:flex;align-items:center;gap:11px;cursor:pointer;transition:transform .15s,box-shadow .15s,background .2s;margin-bottom:7px;}
.card:hover{box-shadow:0 4px 14px rgba(0,0,0,.13);}
.card.ev-card{border-left:4px solid var(--ev);}
.card.resto-card{border-left:4px solid var(--resto);}
.card.shop-card{border-left:4px solid var(--shop);}
.card.activity-card{border-left:4px solid var(--activity);}
.card.delicat-card{border-left:4px solid var(--delicat);}
.card.street-card{border-left:4px solid var(--street);}
.card.garden-card{border-left:4px solid var(--garden);}background:#eaf4fb;box-shadow:0 4px 16px rgba(42,107,138,.18);}
.card-left{display:flex;flex-direction:column;align-items:center;gap:5px;flex-shrink:0;min-width:32px;}
.card-icon{font-size:22px;}
.fav-star{font-size:16px;background:none;border:none;cursor:pointer;padding:0;line-height:1;}
.card-mid{flex:1;min-width:0;}
.card-name{font-weight:700;font-size:13px;margin-bottom:1px;line-height:1.3;}
.card-meta{font-size:11px;color:#888;margin-bottom:3px;}
.card-desc-short{font-size:12px;color:#666;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
/* Bouton info */
.info-btn{background:none;border:1.5px solid #ddd;border-radius:50%;width:30px;height:30px;font-size:14px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#666;transition:background .15s;}
.info-btn:hover{background:#f0f0f0;}

/* Tags */
.card-tag{display:inline-block;font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px;}
.tag-ionity{background:#dff0ea;color:#1a7a4a;}
.tag-total{background:#fff0d0;color:#c07000;}
.tag-becharge{background:#e0eeff;color:#1a4a8a;}
.tag-goelec{background:#f0e8ff;color:#6020b0;}
.tag-freshmile{background:#ffe8e8;color:#b02020;}
.tag-vinci{background:#e8f4ff;color:#005fa3;}
.tag-aller{background:#fde8e8;color:#b03030;}
.tag-retour{background:#e8f0fd;color:#3050b0;}
.tag-aller-retour{background:#f0e8ff;color:#6030a0;}

/* ── BOTTOM SHEET ── */
#sheet-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:800;}
#sheet-overlay.open{display:block;}
#sheet{position:fixed;bottom:0;left:0;width:100%;max-height:90vh;background:white;border-radius:20px 20px 0 0;z-index:900;transform:translateY(100%);transition:transform .32s cubic-bezier(.32,1,.32,1);display:flex;flex-direction:column;}
#sheet.open{transform:translateY(0);}
#sheet-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:10px auto 2px;flex-shrink:0;}
#sheet-scroll{overflow-y:auto;flex:1;padding:0 16px 28px;}
#sheet-header{display:flex;align-items:flex-start;gap:10px;margin-bottom:8px;padding-top:4px;}
#sheet-icon{font-size:28px;flex-shrink:0;margin-top:2px;}
#sheet-title-wrap{flex:1;}
#sheet-name{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;line-height:1.2;}
#sheet-category{font-size:12px;color:#888;margin-top:2px;}
#sheet-fav-btn{font-size:24px;background:none;border:none;cursor:pointer;flex-shrink:0;padding:2px;}
#sheet-rating{display:flex;align-items:center;gap:6px;margin:4px 0 8px;font-size:13px;}
#sheet-stars{color:#e8a020;}
#sheet-rating-val{font-weight:700;}
#sheet-rating-count{color:#aaa;font-size:11px;}
#sheet-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:10px;}
#sheet-desc{font-size:13px;color:#444;line-height:1.6;margin-bottom:12px;}
#sheet-hours{background:#f9f5ef;border-radius:9px;padding:10px 12px;margin-bottom:12px;font-size:12px;line-height:1.9;}
#sheet-hours-title{font-weight:700;font-size:12px;color:#555;margin-bottom:3px;}
#sheet-actions{display:flex;gap:8px;flex-wrap:wrap;}
.sheet-btn{flex:1;min-width:110px;padding:10px 10px;border:none;border-radius:10px;font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;}
.sheet-btn.primary{background:var(--ocean);color:white;}
.sheet-btn.secondary{background:#f0f0f0;color:var(--text);}

/* ── ROUTE PANEL ── */
#route-panel{display:none;position:fixed;inset:0;z-index:1000;background:white;flex-direction:column;}
#route-panel.open{display:flex;}
#route-header{background:var(--ocean);color:white;padding:12px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
#route-header h2{flex:1;font-size:15px;font-family:'Playfair Display',serif;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#route-close{background:none;border:none;color:white;font-size:22px;cursor:pointer;flex-shrink:0;}
#route-form{padding:10px 12px 8px;background:#f9f5ef;border-bottom:1px solid #e0d8cc;flex-shrink:0;display:flex;flex-direction:column;gap:7px;}
.route-row{display:flex;align-items:center;gap:8px;}
.route-lbl{font-size:18px;width:26px;text-align:center;flex-shrink:0;}
.route-input{flex:1;padding:7px 10px;border:1.5px solid #ddd;border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;background:white;color:var(--text);}
.route-input:focus{outline:none;border-color:var(--ocean);}
.route-modes{display:flex;gap:5px;padding-left:34px;}
.mode-btn{padding:4px 10px;border:1.5px solid #ddd;border-radius:14px;cursor:pointer;background:white;font-size:12px;font-family:'DM Sans',sans-serif;color:#555;transition:all .2s;}
.mode-btn.active{background:var(--ocean);border-color:var(--ocean);color:white;}
#route-go{width:100%;padding:9px;background:var(--ocean);color:white;border:none;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;}
#route-go:disabled{background:#aaa;cursor:not-allowed;}
#route-map{flex:1;width:100%;min-height:0;}
#route-summary{padding:8px 14px;font-size:12px;color:#555;background:#f9f5ef;border-top:1px solid #e0d8cc;flex-shrink:0;min-height:32px;}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <span style="font-size:22px">🌴</span>
    <h1>Guide Bordighera</h1>
    <span id="fav-count">0 ❤️</span>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input id="search-input" placeholder="Rechercher un lieu, une spécialité…" oninput="onSearch(this.value)"/>
    <button id="search-clear" onclick="clearSearch()">✕</button>
  </div>
</div>

<div class="controls">
  <button class="filter-btn active"       onclick="filterMarkers('all',this)">Tout</button>
  <button class="filter-btn fav-btn"      onclick="filterMarkers('fav',this)">❤️ Favoris</button>
  <button class="filter-btn"              onclick="filterMarkers('plage',this)">🏖️ Plages</button>
  <button class="filter-btn resto-btn"    onclick="filterMarkers('resto',this)">🍝 Restos</button>
  <button class="filter-btn street-btn"   onclick="filterMarkers('street',this)">🌮 Street food</button>
  <button class="filter-btn delicat-btn"  onclick="filterMarkers('delicat',this)">🫙 Saveurs</button>
  <button class="filter-btn"              onclick="filterMarkers('village',this)">🏘️ Villages</button>
  <button class="filter-btn"              onclick="filterMarkers('kids',this)">👶 Kids</button>
  <button class="filter-btn activity-btn" onclick="filterMarkers('activity',this)">🥾 Arrière-pays</button>
  <button class="filter-btn"              onclick="filterMarkers('logement',this)">🏡 Logement</button>
  <button class="filter-btn shop-btn"     onclick="filterMarkers('shop',this)">🛒 Épiceries</button>
  <button class="filter-btn ev-btn"       onclick="filterMarkers('ev',this)">⚡ Recharge</button>
  <button class="filter-btn garden-btn"   onclick="filterMarkers('garden',this)">🌿 Jardineries</button>
  <button class="filter-btn ceramic-btn"  onclick="filterMarkers('ceramic',this)">🏺 Céramique</button>
</div>

<div id="ev-note" style="display:none" class="ev-note">
  ⚡ <b>KIA e-Niro :</b> CCS Combo2 (~100 kW DC) + Type 2 (AC).
  <span class="card-tag tag-aller">🔴 Aller</span>
  <span class="card-tag tag-retour">🔵 Retour</span>
  <span class="card-tag tag-aller-retour">🟣 Les deux</span>
  <b>Appli : Chargemap ou ABRP.</b>
</div>

<div id="map-wrapper">
  <div id="map"></div>
  <button id="loc-btn" onclick="toggleTracking()" title="Ma position">📍</button>
</div>

<div id="list"></div>

<!-- BOTTOM SHEET -->
<div id="sheet-overlay" onclick="closeSheet()"></div>
<div id="sheet">
  <div id="sheet-handle"></div>
  <div id="sheet-scroll">
    <div id="sheet-header">
      <div id="sheet-icon">📍</div>
      <div id="sheet-title-wrap">
        <div id="sheet-name">Lieu</div>
        <div id="sheet-category"></div>
      </div>
      <button id="sheet-fav-btn" onclick="toggleFavFromSheet()">🤍</button>
    </div>
    <div id="sheet-rating" style="display:none">
      <span id="sheet-stars"></span>
      <span id="sheet-rating-val"></span>
      <span id="sheet-rating-count"></span>
    </div>
    <div id="sheet-tags"></div>
    <div id="sheet-desc"></div>
    <div id="sheet-hours" style="display:none">
      <div id="sheet-hours-title">🕐 Horaires</div>
      <div id="sheet-hours-content"></div>
    </div>
    <div id="sheet-actions"></div>
  </div>
</div>

<!-- ROUTE PANEL -->
<div id="route-panel">
  <div id="route-header">
    <h2 id="route-title">Itinéraire</h2>
    <button id="route-close" onclick="closeRoute()">✕</button>
  </div>
  <div id="route-form">
    <div class="route-row">
      <span class="route-lbl">🟢</span>
      <input id="from-input" class="route-input" placeholder="Départ (vide = ma position)"/>
      <button style="background:none;border:none;font-size:18px;cursor:pointer;padding:4px" onclick="useMyPosition()" title="Ma position">📍</button>
    </div>
    <div class="route-row">
      <span class="route-lbl">🔴</span>
      <input id="to-input" class="route-input" placeholder="Destination" readonly/>
    </div>
    <div class="route-modes">
      <button class="mode-btn active" onclick="setMode(this,'car')">🚗 Voiture</button>
      <button class="mode-btn"        onclick="setMode(this,'foot')">🚶 À pied</button>
      <button class="mode-btn"        onclick="setMode(this,'bike')">🚴 Vélo</button>
    </div>
    <button id="route-go" onclick="calcRoute()">Calculer l'itinéraire</button>
  </div>
  <div id="route-map"></div>
  <div id="route-summary">Entrez un départ ou utilisez votre position.</div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

// Pré-cache tiles zone
function prefetchTiles(){
  if(!('fetch' in window)) return;
  [[43.78,7.665],[43.85,7.62],[43.88,7.66]].forEach(([lat,lng])=>{
    [13,14,15].forEach(z=>{
      const n=Math.pow(2,z),tx=Math.floor((lng+180)/360*n),lr=lat*Math.PI/180,
            ty=Math.floor((1-Math.log(Math.tan(lr)+1/Math.cos(lr))/Math.PI)/2*n);
      [-1,0,1].forEach(dx=>[-1,0,1].forEach(dy=>fetch(`https://a.tile.openstreetmap.org/${z}/${tx+dx}/${ty+dy}.png`,{mode:'no-cors'}).catch(()=>{})));
    });
  });
}
setTimeout(prefetchTiles,2500);

function makeColorIcon(bg,emoji,sel=false){
  return L.divIcon({className:'',
    html:`<div style="position:relative;background:${bg};color:white;border-radius:50%;width:${sel?32:26}px;height:${sel?32:26}px;display:flex;align-items:center;justify-content:center;font-size:${sel?15:13}px;box-shadow:${sel?`0 0 0 3px white,0 0 0 5px ${bg}`:'0 2px 5px rgba(0,0,0,.3)'};transition:all .25s">${emoji}${sel?`<span style="position:absolute;inset:0;border-radius:50%;background:${bg}40;animation:pulse-ring 1.5s ease-out infinite"></span>`:''}</div>`,
    iconSize:sel?[32,32]:[26,26],iconAnchor:sel?[16,16]:[13,13]});
}

function iconForPlace(p,sel=false){
  const bg=COLOR_MAP[p.type]||'#555',em=TYPE_ICON[p.type]||'📍';
  if(!sel&&p.type!=='ev'&&p.type!=='activity'&&p.type!=='delicat'&&p.type!=='street'&&p.type!=='garden'&&p.type!=='ceramic') return new L.Icon.Default();
  return makeColorIcon(bg,em,sel);
}

// Géoloc
let watchId=null,userMarker=null,tracking=false,userLatLng=null;
function toggleTracking(){
  if(!navigator.geolocation){alert('Géolocalisation non disponible.');return;}
  if(tracking){
    navigator.geolocation.clearWatch(watchId);
    if(userMarker){map.removeLayer(userMarker);userMarker=null;}
    document.getElementById('loc-btn').classList.remove('tracking');
    document.getElementById('loc-btn').textContent='📍';
    tracking=false;userLatLng=null;
  } else {
    document.getElementById('loc-btn').textContent='⏳';
    watchId=navigator.geolocation.watchPosition(pos=>{
      userLatLng=[pos.coords.latitude,pos.coords.longitude];
      if(!userMarker){
        userMarker=L.circleMarker(userLatLng,{radius:9,color:'#2a6b8a',fillColor:'#2a6b8a',fillOpacity:.85}).addTo(map).bindPopup('📍 Vous êtes ici');
        map.setView(userLatLng,15);
      } else userMarker.setLatLng(userLatLng);
      document.getElementById('loc-btn').classList.add('tracking');
      document.getElementById('loc-btn').textContent='🔵';
      tracking=true;
    },()=>{document.getElementById('loc-btn').textContent='📍';},{enableHighAccuracy:true,maximumAge:5000});
  }
}

function renderPopup(p){

}

function renderCard(p,idx){
  const cc=CARD_CLASS[p.type]||'';
  const rStr=p.rating?`<span style="color:#e8a020">★${p.rating}</span> · `:'';
  const netTag=p.network?`<span class="card-tag ${TAG_CLASS[p.network]||''}" style="margin-right:3px">${p.networkLabel}</span>`:'';
  const dirTag=p.direction?`<span class="card-tag ${DIRECTION_TAG[p.direction].cls}">${DIRECTION_TAG[p.direction].label}</span>`:'';
  const tagsHtml=(netTag||dirTag)?`<div style="margin-bottom:3px">${netTag}${dirTag}</div>`:'';
  return `
    <div class="card ${cc}" id="card-${idx}" onclick="focusMarker(${idx})">
      <div class="card-left">
        <div class="card-icon">${TYPE_ICON[p.type]||'📍'}</div>
        <button class="fav-star" data-name="${p.name.replace(/"/g,'&quot;')}"
          onclick="event.stopPropagation();toggleFavCard(${idx},this)"
          title="${isFav(p)?'Retirer des favoris':'Ajouter aux favoris'}">${isFav(p)?'❤️':'🤍'}</button>
      </div>
      <div class="card-mid">
        ${tagsHtml}
        <div class="card-name">${p.name}</div>
        <div class="card-meta">${rStr}${GROUP_LABEL[p.type]?.label||''}</div>
        <div class="card-desc-short">${p.desc}</div>
      </div>
      <button class="info-btn" onclick="event.stopPropagation();openSheetForIdx(${idx})" title="Voir la fiche">ℹ️</button>
    </div>`;
}

function toggleFavCard(idx,btn){
  const p=currentFiltered[idx];if(!p)return;
  const on=toggleFav(p);
  btn.textContent=on?'❤️':'🤍';
  if(currentFilterType==='fav')applyFilter('fav',currentSearchQuery);
}

function renderGroupedList(filtered){
  const el=document.getElementById('list');
  el.innerHTML='';
  if(!filtered.length){el.innerHTML='<div class="search-empty">Aucun résultat 🤷</div>';return;}
  const order=['logement','plage','resto','street','delicat','garden','ceramic','village','kids','activity','shop','ev'];
  const groups={};
  filtered.forEach((p,i)=>{if(!groups[p.type])groups[p.type]=[];groups[p.type].push({p,i});});
  order.forEach(type=>{
    if(!groups[type]?.length)return;
    const gl=GROUP_LABEL[type]||{icon:'📍',label:type};
    el.innerHTML+=`<div class="group-header"><span>${gl.icon}</span>${gl.label}<span class="group-count">${groups[type].length}</span></div>`;
    groups[type].forEach(({p,i})=>{el.innerHTML+=renderCard(p,i);});
  });
}

function applyFilter(type,query=''){
  markers.forEach(m=>map.removeLayer(m));markers=[];placeMarkerMap.clear();deselectCurrent();
  document.getElementById('ev-note').style.display='none';
  let base;
  if(type==='fav')      base=allPlaces.filter(p=>isFav(p));
  else if(type==='ev')  {base=evStations;document.getElementById('ev-note').style.display='block';}
  else if(type==='all') base=allPlaces;
  else                  base=places.filter(p=>p.type===type);
  const q=query.toLowerCase().trim();
  const filtered=q?base.filter(p=>p.name.toLowerCase().includes(q)||p.desc.toLowerCase().includes(q)):base;
  currentFiltered=filtered;
  const bounds=[];
  filtered.forEach(p=>{
    const m=L.marker(p.coords,{icon:iconForPlace(p,false)}).addTo(map).bindPopup(renderPopup(p));
    markers.push(m);placeMarkerMap.set(p,m);bounds.push(p.coords);
  });
  renderGroupedList(filtered);
  if(bounds.length)map.fitBounds(bounds,{padding:[40,40]});
}

function filterMarkers(type,btn){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  if(btn)btn.classList.add('active');
  currentFilterType=type;
  applyFilter(type,currentSearchQuery);
}

function openRoutePanel(globalIdx){

  routeDestCoords=p.coords;routeDestName=p.name;
  document.getElementById('route-title').textContent='→ '+p.name;
  document.getElementById('to-input').value=p.name;
  if(userLatLng)document.getElementById('from-input').value='Ma position';
  document.getElementById('route-summary').textContent='Entrez un départ ou utilisez votre position.';

    routeMap.invalidateSize();clearRouteMapLayers();
    routeToMarker=L.marker(p.coords).addTo(routeMap).bindPopup(`<b>🔴 ${p.name}</b>`).openPopup();
    routeMap.setView(p.coords,14);

function clearRouteMapLayers(){
  if(routePolyline){routeMap.removeLayer(routePolyline);routePolyline=null;}
  if(routeFromMarker){routeMap.removeLayer(routeFromMarker);routeFromMarker=null;}
  if(routeToMarker){routeMap.removeLayer(routeToMarker);routeToMarker=null;}
}

function useMyPosition(){

  document.getElementById('from-input').value='Chargement…';
  navigator.geolocation.getCurrentPosition(pos=>{userLatLng=[pos.coords.latitude,pos.coords.longitude];document.getElementById('from-input').value='Ma position';},
  ()=>{document.getElementById('from-input').value='';},{enableHighAccuracy:true,timeout:8000});
}

async function geocode(q){
  const r=await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(q)}&format=json&limit=1`,{headers:{'Accept-Language':'fr'}});
  const d=await r.json();return d?.length?[parseFloat(d[0].lat),parseFloat(d[0].lon)]:null;
}

async function calcRoute(){
  if(!routeDestCoords){alert('Destination non définie.');return;}
  const fromVal=document.getElementById('from-input').value.trim();
  const btn=document.getElementById('route-go');
  btn.disabled=true;btn.textContent='Calcul…';
  document.getElementById('route-summary').textContent='Calcul en cours…';
  let fc=null;
  if(!fromVal||fromVal==='Ma position'){
    if(userLatLng)fc=userLatLng;
    else{try{await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(p=>{userLatLng=[p.coords.latitude,p.coords.longitude];fc=userLatLng;res();},rej,{enableHighAccuracy:true,timeout:7000}));}catch{alert('Position introuvable.');btn.disabled=false;btn.textContent='Calculer l\'itinéraire';return;}}
  } else {fc=await geocode(fromVal);if(!fc){alert('Adresse introuvable.');btn.disabled=false;btn.textContent='Calculer l\'itinéraire';return;}}
  const profile=OSRM[routeMode];
  try{
    const r=await fetch(`https://router.project-osrm.org/route/v1/${profile}/${fc[1]},${fc[0]};${routeDestCoords[1]},${routeDestCoords[0]}?overview=full&geometries=geojson`);
    const data=await r.json();
    if(data.code!=='Ok'||!data.routes?.length)throw 0;
    const route=data.routes[0];
    const dist=(route.distance/1000).toFixed(1),dur=Math.round(route.duration/60);
    const h=Math.floor(dur/60),m=dur%60,durStr=h>0?`${h}h${m.toString().padStart(2,'0')}`:`${m} min`;
    clearRouteMapLayers();
    routePolyline=L.geoJSON(route.geometry,{style:{color:'#2a6b8a',weight:5,opacity:.8}}).addTo(routeMap);
    routeFromMarker=L.circleMarker(fc,{radius:9,color:'#2e9e5b',fillColor:'#2e9e5b',fillOpacity:.9}).addTo(routeMap).bindPopup('🟢 Départ');
    routeToMarker=L.marker(routeDestCoords).addTo(routeMap).bindPopup(`<b>🔴 ${routeDestName}</b>`).openPopup();
    routeMap.fitBounds(routePolyline.getBounds(),{padding:[30,30]});
    document.getElementById('route-summary').innerHTML=`📏 <b>${dist} km</b> &nbsp;|&nbsp; ⏱ <b>${durStr}</b> &nbsp;|&nbsp; <a href="https://www.openstreetmap.org/directions?engine=fossgis_osrm_${profile}&route=${fc[0]},${fc[1]};${routeDestCoords[0]},${routeDestCoords[1]}" target="_blank" style="color:var(--ocean)">Ouvrir sur OSM ↗</a>`;
  }catch{document.getElementById('route-summary').textContent='Impossible de calculer l\'itinéraire.';}
  btn.disabled=false;btn.textContent='Calculer l\'itinéraire';
}

// ═══════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════
applyFilter('all','');
window.addEventListener('resize',()=>{map.invalidateSize();if(routeMap)routeMap.invalidateSize();});
</script>
